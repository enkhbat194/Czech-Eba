<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>CzechMN</title><style>:root{--bg:#0a0a0b;--card:#101024;--panel:#1b1b1e;--line:#35353a;--gold:#f6ae18;--green:#16572a;--red:#692727;--muted:#aaa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial}.app{max-width:560px;margin:auto;min-height:100vh;padding:18px}.top{font-size:21px;font-weight:900;color:var(--gold);margin-bottom:16px}.hero{border:1px solid #265058;border-radius:22px;padding:22px;background:linear-gradient(135deg,#111128,#09283e,#0d2818)}.hero small,.tag{color:var(--gold);font-weight:900;letter-spacing:2px}.hero h1{margin:8px 0;font-size:33px}.hero p,.muted{color:var(--muted);line-height:1.45}.lessons{display:grid;gap:10px;margin-top:18px}.lesson{width:100%;display:flex;align-items:center;gap:13px;padding:15px;border:1px solid var(--line);border-radius:16px;background:var(--panel);color:#fff;text-align:left;font:inherit;touch-action:manipulation}.lesson .emoji{font-size:28px}.lesson .info{flex:1}.lesson b,.lesson small{display:block}.lesson small{color:#888;margin-top:4px}.lesson .state{color:var(--gold);font-weight:900}.head{display:flex;align-items:center;gap:10px}.back{border:0;background:none;color:var(--gold);font-size:30px;touch-action:manipulation}.head b{flex:1}.head small{color:var(--muted)}.bar{height:8px;background:#333;border-radius:99px;overflow:hidden;margin:14px 0}.bar i{display:block;height:100%;background:var(--gold);border-radius:99px}.card{border:2px solid var(--gold);border-radius:24px;padding:28px;min-height:420px;background:var(--card);display:flex;flex-direction:column}.word{font-size:54px;font-weight:900;margin:24px 0;line-height:1.08}.meaning{font-size:25px;color:var(--gold);font-weight:800}.pron{font-size:18px;color:#ddd}.sound{border:0;border-radius:14px;background:#29292d;color:#fff;padding:13px;font-size:18px;font-weight:800;touch-action:manipulation}.choices{display:grid;gap:10px;margin-top:10px}.choice,.next{width:100%;border-radius:14px;padding:16px;font-size:18px;font-weight:800;touch-action:manipulation}.choice{border:1px solid var(--line);background:var(--panel);color:#fff;text-align:left}.choice.ok{background:var(--green);border-color:#50cf70}.choice.bad{background:var(--red);border-color:#e16a62}.next{border:0;background:var(--gold);color:#16120b;margin-top:auto}.hint{margin-top:auto;color:#858585;text-align:center;font-size:13px;line-height:1.4}.done{text-align:center;padding:55px 15px}.done h1{font-size:36px;color:var(--gold)}.error{padding:30px;color:#ff8c82;text-align:center}</style></head><body><div class="app"><div class="top">🇨🇿 CzechMN</div><main id="root">Ачаалж байна…</main></div><script>let course=null;let screen='home';let li=0,phase=0,pos=0,locked=false,options=[];let completed=JSON.parse(localStorage.getItem('czechmn_completed')||'[]');const root=document.getElementById('root');const shuffle=a=>[...a].sort(()=>Math.random()-.5);const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function tap(el,fn){el.addEventListener('pointerup',e=>{e.preventDefault();fn(e.currentTarget)},{passive:false})}function speak(text){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='cs-CZ';u.rate=.78;speechSynthesis.speak(u)}function lesson(){return course.lessons[li]}function words(){return lesson()[3].map(x=>({cs:x[0],mn:x[1],pron:x[2]}))}function save(){localStorage.setItem('czechmn_completed',JSON.stringify(completed))}function goHome(){screen='home';render()}function start(index){li=index;phase=0;pos=0;locked=false;options=[];screen='lesson';render()}function advance(){pos++;locked=false;options=[];if(pos>=words().length){pos=0;phase++}render()}function buildOptions(all,answer){const wrong=shuffle(all.filter(v=>v!==answer)).slice(0,4);return shuffle([answer,...wrong])}function choose(button,index){if(locked)return;locked=true;const w=words()[pos];const answer=phase===1?w.mn:w.cs;const correct=options[index]===answer;button.classList.add(correct?'ok':'bad');if(!correct){const right=[...document.querySelectorAll('.choice')].find(x=>x.dataset.value===answer);if(right)right.classList.add('ok')}setTimeout(advance,correct?450:1000)}function home(){const done=completed.length;return `<section class="hero"><small>СУРГАЛТ</small><h1>Чех хэлийг шаталж сур.</h1><p>Эхлээд үгийг үзнэ. Дараа нь л таних ба санах дасгал хийнэ.</p><b>${done}/${course.lessons.length} lesson дууссан</b></section><section class="lessons">${course.lessons.map((l,i)=>{const isDone=completed.includes(l[0]);const locked=i>0&&!completed.includes(course.lessons[i-1][0]);return `<button class="lesson" data-li="${i}" ${locked?'disabled style="opacity:.45"':''}><span class="emoji">${l[2]}</span><span class="info"><b>${esc(l[1])}</b><small>${l[3].length} үг</small></span><span class="state">${isDone?'✓':locked?'🔒':'›'}</span></button>`}).join('')}</section>`}function lessonView(){const L=lesson(),W=words();if(phase>=3){if(!completed.includes(L[0])){completed.push(L[0]);save()}return `<section class="done"><div class="tag">LESSON COMPLETE</div><h1>Сайн байна.</h1><p>${esc(L[1])} lesson дууслаа.</p><button class="next" id="home">Хичээлүүд рүү буцах</button></section>`}const w=W[pos];const title=`<div class="head"><button class="back" id="back">‹</button><b>${L[2]} ${esc(L[1])}</b><small>${pos+1}/${W.length}</small></div><div class="bar"><i style="width:${Math.round(((phase*W.length+pos)/(3*W.length))*100)}%"></i></div>`;if(phase===0){return title+`<section class="card"><div class="tag">ШИНЭ ҮГ</div><div class="word">${esc(w.cs)}</div><button class="sound" id="sound">🔊 Сонсох</button><div class="meaning">${esc(w.mn)}</div><p class="pron">Дуудлага: ${esc(w.pron)}</p><p class="hint">Эхлээд үгийг сурна. Энэ шатанд таалгадаггүй.</p><button class="next" id="next">Дараах үг</button></section>`}const csToMn=phase===1;const prompt=csToMn?w.cs:w.mn;const answer=csToMn?w.mn:w.cs;if(!options.length)options=buildOptions(W.map(x=>csToMn?x.mn:x.cs),answer);return title+`<section class="card"><div class="tag">${csToMn?'УТГЫГ ТАНЬ':'CZECH ҮГИЙГ САНА'}</div><div class="word">${esc(prompt)}</div>${csToMn?'<button class="sound" id="sound">🔊 Сонсох</button>':''}<div class="choices" id="choices"></div><p class="hint">Зөв бол автоматаар дараагийн дасгал руу орно.</p></section>`}function render(){if(!course)return;root.innerHTML=screen==='home'?home():lessonView();if(screen==='home'){document.querySelectorAll('[data-li]').forEach(b=>tap(b,()=>start(+b.dataset.li)));return}if(phase>=3){tap(document.getElementById('home'),goHome);return}tap(document.getElementById('back'),goHome);const W=words(),w=W[pos];if(phase===0){tap(document.getElementById('sound'),()=>speak(w.cs));tap(document.getElementById('next'),advance);return}if(phase===1)tap(document.getElementById('sound'),()=>speak(w.cs));const box=document.getElementById('choices');options.forEach((value,index)=>{const b=document.createElement('button');b.className='choice';b.textContent=value;b.dataset.value=value;tap(b,btn=>choose(btn,index));box.appendChild(b)})}fetch('./data/czech-course.json').then(r=>r.json()).then(d=>{course=d;render()}).catch(()=>root.innerHTML='<p class="error">Хичээлийн data ачаалж чадсангүй.</p>');</script></body></html>
