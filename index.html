<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CzechMN</title>
<style>
:root{--bg:#090909;--card:#171717;--line:#303030;--gold:#f0aa1a;--green:#4bc05d;--muted:#919191}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{max-width:560px;margin:auto;min-height:100vh}.top{position:sticky;top:0;z-index:4;display:flex;align-items:center;height:60px;padding:0 16px;background:#101010;border-bottom:1px solid #252525}.brand{color:var(--gold);font-weight:900}.home{margin-left:auto;border:0;border-radius:10px;background:#242424;color:var(--gold);padding:8px 12px;font-weight:800}.main{padding:18px 14px 40px}.hero{border:1px solid #24434a;border-radius:22px;padding:22px;background:linear-gradient(135deg,#101027,#082239,#0e2519)}h1{font-size:29px;line-height:1.1;margin:8px 0}.eyebrow{color:var(--gold);font-weight:800;letter-spacing:3px;font-size:11px}.sub,.muted{color:var(--muted)}.count{margin-top:15px;color:#bbb;font-size:13px}.section{font-size:16px;font-weight:900;margin:25px 0 10px}.lesson{width:100%;display:flex;align-items:center;gap:12px;padding:15px;margin:9px 0;background:var(--card);border:1px solid var(--line);border-radius:16px;color:white;text-align:left}.lesson:active{border-color:var(--gold)}.emoji{font-size:28px}.lesson b{display:block}.lesson small{color:#777}.arrow{margin-left:auto;color:#666;font-size:24px}.back{border:0;background:none;color:var(--gold);font-size:28px;padding:0 4px}.head{display:flex;align-items:center;gap:8px;margin-bottom:16px}.head h2{font-size:19px;margin:0}.head small{margin-left:auto;color:#777}.tabs{display:flex;background:#171717;border-radius:13px;padding:4px;margin-bottom:14px}.tabs button{flex:1;border:0;background:transparent;color:#888;border-radius:10px;padding:9px;font-weight:800}.tabs .active{background:var(--gold);color:#111}.counter{display:flex;justify-content:space-between;color:#999;font-size:13px;margin:10px 0}.bar{height:8px;background:#292929;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:var(--gold);border-radius:99px}.card{margin-top:20px;min-height:240px;border:2px solid var(--gold);border-radius:22px;padding:24px;background:#0d0d20;display:flex;flex-direction:column;justify-content:center}.card.flipped{border-color:var(--green);background:#0d1d0f}.label{color:var(--gold);font-size:11px;letter-spacing:3px;font-weight:900}.flipped .label{color:var(--green)}.wordrow{display:flex;align-items:center;gap:10px}.word{font-size:39px;font-weight:950;word-break:break-word;margin-top:12px}.speaker{margin-left:auto;border:0;border-radius:50%;width:47px;height:47px;background:#232323;color:#fff;font-size:20px}.hint{text-align:center;color:#555;margin-top:30px}.nav{display:flex;gap:10px;margin-top:14px}.nav button{flex:1;border:0;border-radius:13px;background:#232323;color:#fff;padding:13px;font-weight:800}.list{display:flex;flex-direction:column;gap:8px}.item{padding:14px;border:1px solid var(--line);border-radius:14px;background:var(--card);display:flex;align-items:center;gap:10px}.item strong{font-size:17px}.item .speaker{width:42px;height:42px}.empty{padding:35px 5px;text-align:center;color:#aaa}
</style>
</head>
<body><div id="root"></div>
<script>
let course=null;let state={screen:'home',lesson:null,index:0,flipped:false,mode:'card'};
function speak(text){if(!('speechSynthesis' in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='cs-CZ';u.rate=.78;window.speechSynthesis.speak(u)}
function goHome(){state={screen:'home',lesson:null,index:0,flipped:false,mode:'card'};render()}
function openLesson(i){state={screen:'lesson',lesson:course.lessons[i],index:0,flipped:false,mode:'card'};render()}
function move(n){state.index=Math.max(0,Math.min(state.lesson.items.length-1,state.index+n));state.flipped=false;render()}
function renderHome(){const total=course.lessons.reduce((a,l)=>a+l.items.length,0);return `<div class="hero"><div class="eyebrow">МОНГОЛ → CZECH</div><h1>Czech Хэл<br>Сурах Апп</h1><div class="sub">Үсэг, тоо, үг, бодит өгүүлбэрүүдийг lesson-ээр нь сурна.</div><div class="count">Нийт <b style="color:var(--gold)">${total}</b> Czech текст • ${course.lessons.length} lesson</div></div><div class="section">📖 Хичээлүүд</div>${course.lessons.map((l,i)=>`<button class="lesson" onclick="openLesson(${i})"><span class="emoji">${l.emoji}</span><span><b>${l.title}</b><small>${l.items.length} үг, хэллэг, өгүүлбэр</small></span><span class="arrow">›</span></button>`).join('')}`}
function renderLesson(){const l=state.lesson;const item=l.items[state.index];const total=l.items.length;let content='';if(state.mode==='card'){content=`<div class="counter"><span>Карт ${state.index+1} / ${total}</span></div><div class="bar"><i style="width:${Math.round(state.index/Math.max(1,total-1)*100)}%"></i></div><div class="card ${state.flipped?'flipped':''}" onclick="state.flipped=!state.flipped;render()">${state.flipped?`<div class="label">CZECH TEXT</div><div class="word">${item}</div><div class="hint">дараад буцаж харна</div>`:`<div class="label">CZECH</div><div class="wordrow"><div class="word">${item}</div><button class="speaker" onclick="event.stopPropagation();speak(${JSON.stringify(item)})">🔊</button></div><div class="hint">дарж эргүүлнэ</div>`}</div><div class="nav"><button onclick="move(-1)" ${state.index===0?'disabled':''}>← Өмнөх</button><button onclick="move(1)" ${state.index===total-1?'disabled':''}>Дараах →</button></div>`}else{content=`<div class="list">${l.items.map(x=>`<div class="item"><strong>${x}</strong><button class="speaker" onclick="speak(${JSON.stringify(x)})">🔊</button></div>`).join('')}</div>`}return `<div class="head"><button class="back" onclick="goHome()">←</button><div><h2>${l.emoji} ${l.title}</h2></div><small>${total} текст</small></div><div class="tabs"><button class="${state.mode==='card'?'active':''}" onclick="state.mode='card';render()">🃏 Карт</button><button class="${state.mode==='list'?'active':''}" onclick="state.mode='list';render()">📋 Жагсаалт</button></div>${content}`}
function render(){if(!course){document.getElementById('root').innerHTML='<div class="app"><main class="main"><div class="empty">Өгөгдөл ачаалж байна…</div></main></div>';return}document.getElementById('root').innerHTML=`<div class="app"><div class="top"><span>🇨🇿</span><span class="brand">CzechMN</span>${state.screen!=='home'?'<button class="home" onclick="goHome()">⌂ Нүүр</button>':''}</div><main class="main">${state.screen==='home'?renderHome():renderLesson()}</main></div>`}
fetch('./data/czech-course.json').then(r=>{if(!r.ok)throw new Error('data load failed');return r.json()}).then(d=>{course=d;render()}).catch(()=>{document.getElementById('root').innerHTML='<div class="app"><main class="main"><div class="empty">Course data ачаалж чадсангүй. Page-ээ дахин refresh хийгээд үз.</div></main></div>'});render();
</script></body></html>
