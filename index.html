<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101010"><title>OctoLearn Czech</title><style>:root{--bg:#101010;--panel:#202020;--panel2:#292929;--line:#393939;--white:#f7f7f7;--muted:#989898;--cyan:#2ccbe8;--orange:#ff7a16;--green:#25c965;--red:#d95959}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{max-width:460px;min-height:100svh;margin:auto;padding:20px 20px 28px;display:flex;flex-direction:column}.top{display:flex;align-items:center;gap:14px;margin:2px 0 18px}.close{border:1px solid var(--line);background:var(--panel);color:#ddd;width:46px;height:46px;border-radius:50%;font-size:30px}.prog{flex:1}.progline{height:10px;border-radius:99px;background:var(--panel2);overflow:hidden}.progline i{display:block;height:100%;background:var(--cyan);border-radius:99px;box-shadow:0 0 14px #2ccbe8}.progressText{font-weight:800;color:#ddd}.octoTip{display:flex;align-items:center;gap:12px;margin:8px 0}.octo{font-size:72px;line-height:1;filter:drop-shadow(0 8px 14px #000)}.tip{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:26px;padding:20px;font-size:17px;font-weight:750;line-height:1.35}.phrase{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:360px}.phrase h1{font-size:37px;margin:0 0 20px;letter-spacing:-1px}.phrase h1 .hit{color:var(--cyan)}.translation{margin:0;color:var(--cyan);font-size:22px;font-weight:800}.replay{margin-top:64px;border:1px solid var(--line);background:var(--panel);width:100px;height:100px;border-radius:50%;font-size:34px;color:#ddd}.replayLabel{color:var(--muted);font-weight:700;margin-top:12px}.actions{margin-top:auto}.secondary{display:flex;justify-content:center;gap:12px;margin-bottom:22px}.secondary button{border:1px solid var(--line);background:var(--panel);border-radius:20px;padding:15px 20px;color:#aaa;font:inherit;font-weight:750}.primary{width:100%;border:0;border-radius:26px;padding:20px;background:var(--cyan);color:white;font:inherit;font-weight:900;font-size:21px;box-shadow:0 12px 26px #0f697766}.primary.listening{background:#1a6878}.primary.success{background:var(--green)}.notice{margin:0 0 15px;text-align:center;color:var(--red);font-weight:700}.homeTitle{font-size:30px;margin:18px 0 8px}.sub{color:#aab8c7;line-height:1.5}.level{border:1px solid var(--line);background:var(--panel);border-radius:22px;padding:15px;margin:12px 0;display:flex;align-items:center;gap:14px}.badge{width:58px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:25px;font-weight:900;background:#1d3b43;color:var(--cyan)}.level b{font-size:18px}.level small{display:block;color:#aab8c7;margin-top:5px}.level button{margin-left:auto;width:28px;height:28px;border:2px solid #777;border-radius:50%;background:none}.level.active{border-color:var(--cyan)}.level.active button{background:var(--cyan);box-shadow:inset 0 0 0 6px var(--panel)}.birthday{text-align:center}.birthday .cake{font-size:46px;margin:18px auto}.wheel{margin-top:30px;border:1px solid var(--line);border-radius:28px;background:var(--panel);padding:34px 12px;display:grid;grid-template-columns:1fr 1fr .55fr;gap:8px}.wheel div{display:grid;gap:13px;font-size:22px;color:#777}.wheel strong{display:block;background:#414143;color:#fff;border-radius:14px;padding:10px 0}.selectedDate{margin:18px auto;color:var(--orange);border:1px solid #8c4614;border-radius:18px;width:max-content;padding:10px 16px;font-weight:900}.orange{background:var(--orange)}.hidden{display:none!important}@media(max-height:740px){.phrase{min-height:250px}.octo{font-size:58px}.tip{font-size:15px;padding:15px}.replay{margin-top:30px}}</style></head><body><div class="app" id="root"></div><script src="./app.js"></script></body></html>
