<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#101010"><title>OctoLearn Czech</title><style>:root{--bg:#101010;--panel:#202020;--panel2:#292929;--line:#393939;--white:#f7f7f7;--muted:#989898;--cyan:#2ccbe8;--orange:#ff7a16;--green:#25c965;--red:#d95959}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{max-width:460px;min-height:100svh;margin:auto;padding:20px 20px 28px;display:flex;flex-direction:column}.top{display:flex;align-items:center;gap:14px;margin:2px 0 8px}.close{border:1px solid var(--line);background:var(--panel);color:#ddd;width:46px;height:46px;border-radius:50%;font-size:30px}.prog{flex:1}.progline{height:10px;border-radius:99px;background:var(--panel2);overflow:hidden}.progline i{display:block;height:100%;background:var(--cyan);border-radius:99px;box-shadow:0 0 14px #2ccbe8}.progressText{font-weight:800;color:#ddd}.brand{display:flex;align-items:center;gap:10px;color:var(--cyan);font-size:18px;font-weight:900;letter-spacing:.4px;margin:0 0 12px}.brand img{width:42px;height:42px}.eyebrow{color:var(--cyan);font-weight:900;font-size:12px;letter-spacing:2px;margin:8px 0}.profileScreen{text-align:center;padding-top:42px}.profileMark{width:112px;height:112px;filter:drop-shadow(0 10px 20px #1ecbe855)}.profileCards{display:grid;gap:14px;margin-top:34px;text-align:left}.profileCard{display:flex;align-items:center;gap:16px;width:100%;border:1px solid var(--line);background:var(--panel);border-radius:24px;padding:18px;color:var(--white);font:inherit;text-align:left}.profileCard:hover{border-color:var(--profile)}.profileAvatar{width:60px;height:60px;border-radius:20px;display:grid;place-items:center;background:color-mix(in srgb,var(--profile) 22%,#19232a);color:var(--profile);font-weight:900;font-size:30px}.profileCard b{display:block;font-size:22px}.profileCard small{display:block;color:#aab8c7;margin-top:5px}.profileCard i{font-size:34px;color:var(--profile);margin-left:auto;font-style:normal}.learnerBar{display:flex;justify-content:space-between;align-items:center;color:#aab8c7;font-size:13px;margin:0 0 8px;padding:0 4px}.learnerBar button{background:none;border:0;color:var(--cyan);font:inherit;font-weight:800}.octoTip{display:flex;align-items:center;gap:12px;margin:8px 0}.octoLogo{width:108px;height:108px;object-fit:contain;filter:drop-shadow(0 8px 14px #000)}.tip{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:26px;padding:20px;font-size:17px;font-weight:750;line-height:1.35}.phrase{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:360px}.phrase h1{font-size:37px;margin:0 0 12px;letter-spacing:-1px}.phrase h1 .hit{color:var(--cyan)}.pronGuide{margin:0 0 10px;color:#c7d2dc;font-size:17px;font-weight:750}.translation{margin:0;color:var(--cyan);font-size:22px;font-weight:800}.replay{margin-top:64px;border:1px solid var(--line);background:var(--panel);width:100px;height:100px;border-radius:50%;font-size:34px;color:#ddd}.replayLabel{color:var(--muted);font-weight:700;margin-top:12px}.actions{margin-top:auto}.secondary{display:flex;justify-content:center;gap:12px;margin-bottom:22px}.secondary button{border:1px solid var(--line);background:var(--panel);border-radius:20px;padding:15px 20px;color:#aaa;font:inherit;font-weight:750}.primary{width:100%;border:0;border-radius:26px;padding:20px;background:var(--cyan);color:white;font:inherit;font-weight:900;font-size:21px;box-shadow:0 12px 26px #0f697766}.primary.listening{background:#1a6878}.primary.success{background:var(--green)}.notice{margin:0 0 15px;text-align:center;color:var(--red);font-weight:700}.homeTitle{font-size:30px;margin:18px 0 8px}.sub{color:#aab8c7;line-height:1.5}.level{border:1px solid var(--line);background:var(--panel);border-radius:22px;padding:15px;margin:12px 0;display:flex;align-items:center;gap:14px}.badge{width:58px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:25px;font-weight:900;background:#1d3b43;color:var(--cyan)}.level b{font-size:18px}.level small{display:block;color:#aab8c7;margin-top:5px}.level button{margin-left:auto;width:28px;height:28px;border:2px solid #777;border-radius:50%;background:none}.level.active{border-color:var(--cyan)}.level.active button{background:var(--cyan);box-shadow:inset 0 0 0 6px var(--panel)}@media(max-height:740px){.phrase{min-height:230px}.octoLogo{width:84px;height:84px}.tip{font-size:15px;padding:15px}.replay{margin-top:30px}.profileScreen{padding-top:18px}}</style></head><body><div class="app" id="root"></div><script src="./app.js"></script></body></html>
