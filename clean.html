<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CzechMN</title><style>:root{--bg:#090909;--panel:#171719;--line:#303036;--gold:#f6ae18;--muted:#9a9a9f;--green:#54c86b;--red:#ca534a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial}button{font:inherit}.app{max-width:560px;margin:auto;min-height:100vh}.top{height:62px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #252529;gap:8px}.brand{font-weight:900;color:var(--gold);font-size:20px}.main{padding:18px 14px 44px}.hero{padding:22px;border:1px solid #24444a;border-radius:22px;background:linear-gradient(135deg,#111128,#09263c,#0d2818)}.hero small,label{color:var(--gold);font-weight:900;letter-spacing:2px}.hero h1{font-size:32px;margin:8px 0}.hero p,.dim{color:var(--muted);line-height:1.45}.hero b{font-size:13px;color:#ddd}h2{font-size:16px;margin:26px 0 10px}.todayCard{margin-top:14px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:18px}.todayCard h2{margin:0 0 8px}.start,.continue{width:100%;border:0;border-radius:14px;background:var(--gold);color:#15120b;padding:14px;font-weight:900;margin-top:8px}.tabs{display:flex;gap:7px;overflow:auto;margin-top:18px}.tabs button{white-space:nowrap;border:1px solid var(--line);background:var(--panel);color:#ddd;border-radius:12px;padding:10px 12px}.tabs .active{background:#29220e;color:var(--gold);border-color:#765b19}.lessons{display:grid;gap:9px}.lesson{width:100%;display:flex;align-items:center;gap:13px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:16px;color:white;text-align:left}.lesson span{font-size:27px}.lesson b,.lesson small{display:block}.lesson small{margin-top:4px;color:#777}.lesson i{margin-left:auto;color:#777;font-size:25px}.lessonHead{display:flex;gap:10px;align-items:center;margin-bottom:14px}.lessonHead button{border:0;background:transparent;color:var(--gold);font-size:28px}.lessonHead div{flex:1}.lessonHead small{float:right;color:#777}.bar{height:8px;background:#29292d;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:var(--gold);border-radius:99px}.flash,.quiz{margin-top:22px;min-height:300px;border:2px solid var(--gold);border-radius:24px;padding:28px 24px;background:#0d0d20;display:flex;flex-direction:column;justify-content:center}.flash h1,.quiz h1{font-size:44px;line-height:1.08;margin:18px 0}.wordLine{display:flex;gap:10px;align-items:flex-start}.wordLine h1{flex:1}.wordLine button,.sound{border:0;background:#29292d;color:#fff;border-radius:50%;width:52px;height:52px;font-size:20px;margin-top:12px}.sound{width:auto;border-radius:12px;padding:10px 14px;margin:0}.pron{font-size:20px;color:#ddd;line-height:1.4}.meaning{font-size:22px;color:var(--gold);font-weight:800}.rates{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:15px}.rates button{border:0;border-radius:13px;background:#29292d;color:#fff;padding:12px;font-weight:800}.rates button:nth-child(1){background:#6b2e2b}.rates button:nth-child(3){background:#21683a}.rates small{color:#ccc}.opts{display:grid;gap:9px;margin-top:20px}.opts button{border:1px solid var(--line);background:var(--panel);color:#fff;border-radius:13px;padding:14px;text-align:left;font-weight:700}.opts .ok{background:#164724;border-color:var(--green)}.opts .bad{background:#4a1b19;border-color:var(--red)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.stats div{padding:18px 8px;text-align:center;border-radius:15px;background:var(--panel);border:1px solid var(--line)}.stats b{font-size:28px;color:var(--gold);display:block}.stats small{color:#888}.empty,.error{padding:40px;color:#aaa;text-align:center}.error{color:#f77}</style></head><body><div class="app"><header class="top">🇨🇿 <span class="brand">CzechMN</span></header><main id="root" class="main">Ачаалж байна…</main></div><script
