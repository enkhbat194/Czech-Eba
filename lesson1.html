<!doctype html><html lang="mn"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CzechMN Lesson 1</title><style>body{margin:0;background:#0a0a0b;color:#fff;font:18px -apple-system,Arial}.app{max-width:560px;margin:auto;padding:18px}.top{color:#f6ae18;font-weight:900;font-size:20px}.bar{height:8px;background:#333;border-radius:10px;margin:18px 0}.bar i{display:block;height:100%;background:#f6ae18;border-radius:10px}.card{border:2px solid #f6ae18;border-radius:24px;padding:28px;min-height:350px;background:#101024}.tag{color:#f6ae18;font-size:12px;font-weight:900;letter-spacing:2px}.word{font-size:56px;margin:24px 0}.meaning{font-size:26px;color:#f6ae18;font-weight:800}.pron{color:#ddd}.btn{width:100%;margin-top:14px;padding:16px;border:0;border-radius:14px;background:#f6ae18;color:#17120a;font-size:18px;font-weight:900}.option{width:100%;margin-top:10px;padding:15px;border:1px solid #343438;border-radius:14px;background:#1a1a1d;color:#fff;text-align:left;font-size:18px;font-weight:800}.ok{background:#17562a}.bad{background:#692727}.hint{margin-top:28px;text-align:center;color:#777;font-size:13px}</style><body><div class="app"><div class="top">🇨🇿 CzechMN · Lesson 1</div><div class="bar"><i id="bar"></i></div><main id="root"></main></div><script>const W=[['Já','Би','яа'],['Ty','Чи','ти'],['On','Тэр (эр)','он'],['Ona','Тэр (эм)','она']];let phase=0,pos=0,locked=false,answers=[];const root=document.querySelector('#root'),bar=document.querySelector('#bar');const shuffle=a=>[...a].sort(()=>Math.random()-.5);function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='cs-CZ';u.rate=.68;speechSynthesis.speak(u)}function advance(){pos++;locked=false;answers=[];if(pos>=W.length){pos=0;phase++}render()}function answer(button,n){if(locked)return;locked=true;let right=phase===1?W[pos][1]:W[pos][0];let isRight=answers[n]===right;button.classList.add(isRight?'ok':'bad');if(!isRight){let correctIndex=answers.indexOf(right);document.querySelector('[data-i="'+correctIndex+'"]').classList.add('ok')}if(phase===2){speak(W[pos][0]);setTimeout(advance,1500);return}setTimeout(advance,isRight?450:950)}function render(){if(phase===3){bar.style.width='100%';root.innerHTML='<section class="card"><div class="tag">ДУУССАН</div><div class="word">Сайн байна.</div><p>Эхлээд 4 үгийг үзсэн. Дараа нь Czech → Монгол, Монгол → Czech гэж шалгалаа.</p></section>';return}let w=W[pos],teach=phase===0;bar.style.width=((phase*4+pos)/12*100)+'%';if(teach){root.innerHTML='<section class="card"><div class="tag">ШИНЭ ҮГ · '+(pos+1)+'/4</div><div class="word">'+w[0]+'</div><button class="option" id="audio">🔊 Сонсох</button><div class="meaning">'+w[1]+'</div><p class="pron">Дуудлага: '+w[2]+'</p><div class="hint">Энэ шатанд таахгүй. Эхлээд үгийг сурна.</div></section><button class="btn" id="next">Дараах үг</button>';document.querySelector('#audio').addEventListener('click',()=>speak(w[0]));document.querySelector('#next').addEventListener('click',advance);return}let q=phase===1?w[0]:w[1];if(!answers.length)answers=shuffle(W.map(x=>phase===1?x[1]:x[0]));root.innerHTML='<section class="card"><div class="tag">'+(phase===1?'УТГЫГ ТАНЬ':'CZECH ҮГИЙГ САНА')+' · '+(pos+1)+'/4</div><div class="word">'+q+'</div>'+(phase===1?'<button class="option" id="audio">🔊 Сонсох</button>':'')+'<div id="choices"></div><div class="hint">Монгол асуултад сонголт дармагц зөв Czech хариулт дуугарна.</div></section>';if(phase===1)document.querySelector('#audio').addEventListener('click',()=>speak(w[0]));let choices=document.querySelector('#choices');answers.forEach((x,n)=>{let b=document.createElement('button');b.className='option';b.textContent=x;b.dataset.i=n;b.addEventListener('click',()=>answer(b,n));choices.appendChild(b)})}render()</script></body></html>
